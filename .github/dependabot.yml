version: 2
updates:

  - package-ecosystem: "github-actions"
    open-pull-requests-limit: 10
    directories:
      - "/"
      - "/.github/actions/*"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7

  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
    open-pull-requests-limit: 10
    ignore:
      # used to generate Mariner models.
      # pin to keep from introducing needless drift in the models.
      - dependency-name: "xsdata"
