version: 2
updates:

  - package-ecosystem: "github-actions"
    open-pull-requests-limit: 10
    directories:
      - "/"
      - "/.github/actions/*"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
    open-pull-requests-limit: 10
    groups:
      ruff:
        patterns:
          - "ruff"
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
        exclude-patterns:
          - "ruff"
    ignore:
      # used to generate Mariner models.
      # pin to keep from introducing needless drift in the models.
      - dependency-name: "xsdata"
