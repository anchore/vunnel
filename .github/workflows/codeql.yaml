name: "CodeQL"

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: "38 11 * * 3"

permissions: {}

jobs:
  analyze:
    name: Analyze
    uses: anchore/workflows/.github/workflows/codeql.yaml@c8124d07eda64dc19b5eecb9ffd2ad4643c0aae4 # v0.7.1
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read
    with:
      languages: "python,actions"
