name: "Bootstrap"
description: "Bootstrap all tools and dependencies"
inputs:
  python-version:
    description: "Python version to install"
    required: true
    # note: the caller really drives this in a matrix strategy run for unit tests.
    # this default value is used for the rest of the workflow.
    default: "3.13"
  uv-version:
    description: "UV version to install"
    required: true
    default: "0.5.16"
  cache-key-prefix:
    description: "Prefix all cache keys with this value"
    required: true
    default: "9c833ef7"
  bootstrap-apt-packages:
    description: "Space delimited list of tools to install via apt"
    default: ""
runs:
  using: "composite"
  steps:
    # delegates go install + tool cache to go-make/setup, which uses restore-only caching on
    # non-default branches (and the upstream repo's default branch only writes). This prevents
    # cache poisoning from PRs and forks.
    - name: Setup go and tool cache
      uses: anchore/go-make/.github/actions/setup@430e2175bb166bfd138ef75466adbcc8ddab875f # v0.8.0
      with:
        cache-key-prefix: ${{ inputs.cache-key-prefix }}

    - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      with:
        # built-in cache is disabled to prevent PRs from poisoning the cache; uv's resolver is
        # fast enough without it. See cache-poisoning audit for details.
        enable-cache: false

    - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install apt packages
      if: inputs.bootstrap-apt-packages != ''
      shell: bash
      env:
        APT_PACKAGES: ${{ inputs.bootstrap-apt-packages }}
      run: |
        # convert space-separated string to bash array for safe handling
        read -ra packages <<< "$APT_PACKAGES"
        if [ ${#packages[@]} -gt 0 ]; then
          DEBIAN_FRONTEND=noninteractive sudo apt update && sudo -E apt install -y "${packages[@]}"
        fi

    - name: Install project + dependencies
      shell: bash
      run: uv sync --all-extras --dev

    # tox cache: restore-only on non-default branches and forks to prevent cache poisoning.
    - name: Restore tox cache
      if: github.ref != format('refs/heads/{0}', github.event.repository.default_branch) || github.event.repository.fork == true
      uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: .tox
        key: ${{ inputs.cache-key-prefix }}-${{ runner.os }}-${{ inputs.python-version }}-${{ hashFiles('pyproject.toml') }}-${{ hashFiles('tox.ini') }}

    # tox cache: restore + save on the upstream default branch only.
    - name: Restore and save tox cache
      if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch) && github.event.repository.fork == false
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: .tox
        key: ${{ inputs.cache-key-prefix }}-${{ runner.os }}-${{ inputs.python-version }}-${{ hashFiles('pyproject.toml') }}-${{ hashFiles('tox.ini') }}
